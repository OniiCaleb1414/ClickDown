<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Critical: proper mobile viewport - prevents horizontal scroll and blank space -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / App feel on mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AcadDesk" />
    <meta name="theme-color" content="#0A0A0C" />

    <title>AcadDesk</title>

    <style>
      /* Kill all margin/padding/overflow from the root up */
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        background: #0A0A0C;
        /* Remove the grey blank space at the bottom on mobile browsers */
        height: auto;
        min-height: 100%;
      }
      #root {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
